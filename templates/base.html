{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Twitter Clone Aero</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="page">
        <aside class="card sidebar">
            <h1 class="logo">WIM Messenger 🫧</h1>
            {% if user.is_authenticated %}
                <nav>
                    <a class="nav-link" href="{% url 'feed' %}">🏠 Feed</a>
                    <a class="nav-link" href="{% url 'profile' %}">👤 Perfil</a>
                    <a class="nav-link" href="{% url 'users_list' %}">🐟 Usuários</a>
                </nav>
                <p>Olá, {{ user.username }}!</p>
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit">Sair</button>
                </form>
            {% else %}
                <nav>
                    <a class="nav-link" href="{% url 'login' %}">Entrar</a>
                    <a class="nav-link" href="{% url 'register' %}">Criar conta</a>
                </nav>
            {% endif %}
        </aside>
        <main>
            {% block content %}
            {% endblock %}
        </main>
        <aside class="card right-panel">
            <h2>🌊 Aero vibes</h2>
            <p>Azul, ciano, verde e peixinhos laranja.</p>
            <p class="orange-fish">🐠 🐠 🐠</p>
        </aside>
    </div>
</body>
</html>
