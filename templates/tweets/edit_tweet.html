{% extends "base.html" %}
{% block content %}

<section class="card">
    <h2>✏️ Editar tweet</h2>
    <form class="edit-form" method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="edit-actions">
            <button type="submit">
                Salvar
            </button>
            <br>
            <a href="{% url 'feed' %}">
                ← Voltar
            </a>
        </div>
    </form>

</section>

{% endblock %}
