{% extends "base.html" %}

{% block content %}
    <h2>Entrar</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

    <p>
        Ainda não tem conta?
        <a href="{% url 'register' %}">Criar conta</a>
    </p>
{% endblock %}
