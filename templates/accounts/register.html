{% extends "base.html" %}

{% block content %}
<div class="auth-page">
    <section class="card auth-card">
        <h2>🐠 Criar conta</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Criar conta</button>
        </form>
        <p>
            Já possui uma conta?
            <a href="{% url 'login' %}">Entrar</a>
        </p>
    </section>
</div>
{% endblock %}
